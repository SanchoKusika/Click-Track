services:
  postgres:
    image: postgres:16-alpine
    container_name: click-intern-postgres-dev
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:20-alpine
    container_name: click-intern-backend-dev
    working_dir: /app
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run start:dev"

  frontend:
    image: node:20-alpine
    container_name: click-intern-frontend-dev
    working_dir: /app
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data_dev:
  backend_node_modules:
  frontend_node_modules:
